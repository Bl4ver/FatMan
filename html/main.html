    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/game.css">
    <script type="module" src="../js/core/main.js"></script>
    <title>Document</title>

<body>
    <section id="screen">

    </section>

    <template id="mainMenuTemp">
        <select id="menuLang" class="menuBt">
            <option selected>EN</option>
            <option>HU</option>
            <option>GER</option>
        </select>

        <div id="mainMenu">
            <h1 id="menuTitle">Fat-Man</h1>
            <button data-button="playTemp" id="menuBtPlay" class="menuBt" data-translate="play">Play</button>
            <button data-button="settingsTemp" id="menuBtSettings" class="menuBt" data-translate="settings">Settings</button>
            <button data-button="infoTemp" id="menuBtDesc" class="menuBt" data-translate="info">Info</button>
        </div>
    </template>

    <template id="settingsTemp">
        <button id="settingsBack" data-button="mainMenuTemp" data-translate="backButton" class="menuBt"><img src="../src/image/arrow_back_ios_26dp_FFFFFF_FILL0_wght400_GRAD0_opsz24.svg">Back</button>
        <select id="menuLang" class="menuBt">
            <option selected>EN</option>
            <option>HU</option>
            <option>GER</option>
        </select>
        <div id="settingsMenu">
            <h1 id="menuTitle" style="letter-spacing: 0;">Settings</h1>

            <section class="label">
                <label for="inputMasterVolume" id="labelMaster" data-translate="masterVolume">Master Volume </label>
                (<span class="volumeValue" id="masterVolumeValue">0</span>)
            </section>

            <input id="inputMasterVolume" type="range" min="0" max="100" step="1" value="50">

            <section class="label">
                <label for="inputMusicVolume" id="labelMusic" data-translate="musicVolume">Music Volume </label>
                (<span class="volumeValue" id="musicVolumeValue">0</span>)  
            </section>

            <input id="inputMusicVolume" type="range" min="0" max="100" step="1" value="50">

            <section class="label">
                <label for="inputSFXVolume" id="labelSFX" data-translate="sfxVolume">SFX Volume </label>
                (<span class="volumeValue" id="sfxVolumeValue">0</span>)
            </section>
            <input id="inputSFXVolume" type="range" min="0" max="100" step="1" value="50">

            <button data-button="s" class="menuBt">TESZT BUTTON</button>
        </div>
    </template>

    <template id="infoTemp">
        <button id="settingsBack" data-button="mainMenuTemp" data-translate="backButton" class="menuBt"><span class="material-symbols-outlined">arrow_back_ios</span>Back</button>
        <select id="menuLang" class="menuBt">
            <option selected>EN</option>
            <option>HU</option>
            <option>GER</option>
        </select>
        <div id="infoContainer">
            <h1 id="infoTitle" data-translate="infoTitle">Gameplay</h1>
            <div id="infoCategories">
                <section data-desc="Gameplay" id="infoSectGameplay" class="ctSelected">Gameplay</section>
                <section data-desc="Characters" id="infoSectCharacters">Characters</section>
                <section data-desc="Map" id="infoSectMap">The Map</section>
                <section data-desc="Controls" id="infoSectControls">Controls</section>
            </div>
            <div id="infoDesc">
                <span>A játékmenet alapjai</span><br>
                A feladat rendkívül egyszerű, mégis kihívásokkal teli: egy zárt labirintusban kell irányítanunk a főhőst, azzal a céllal, hogy a pályán lévő összes elszórt pontot összegyűjtsük. A feszültségről a folyamatosan járőröző és ránk vadászó ellenfelek – általában szellemek vagy apró szörnyek – gondoskodnak, akiket minden áron el kell kerülnünk.<br>
                <br><span>Különleges képességek</span><br>
                A pályák bizonyos pontjain elrejtett speciális bónuszok (energiabogyók) megfordítják az erőviszonyokat. Ezek felvételével rövid időre a mi karakterünk válik a vadásszá, és esélyt kapunk arra, hogy ideiglenesen kiiktassuk az üldözőinket extra pontokért.<br>
                <br><span>Pályadizájn és nehezedés</span><br>
                Ahogy haladunk előre, a labirintusok vonalvezetése egyre trükkösebbé válik, a menekülési útvonalak pedig beszűkülnek. Az ellenfelek nemcsak felgyorsulnak a magasabb szinteken, hanem a mozgásuk és az AI (mesterséges intelligencia) is agresszívabbá válik, így a túléléshez egyre precízebb manőverezésre és taktikus előrelátásra van szükség.<br>
                <br><span>Látványvilág és atmoszféra</span><br>
                A vizuális stílus hű marad a retro gyökerekhez: élénk, vibráló színek kontrasztja érvényesül a sötét háttér előtt, ami azonnal megteremti az egykori sötét játéktermek hangulatát. Ezt egészítik ki a jellegzetes, pittyegő hanghatások és a feszültséget fokozó hangeffektek, amelyek együtt egy nosztalgikus, mégis izgalmas atmoszférát teremtenek.
            </div>
