<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back_ios"/>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/game.css">
    <script type="module" src="../js/core/main.js"></script>
    <title>Document</title>
</head>

<body>
    <section id="screen">

    </section>

    <template id="mainMenuTemp">
        <select id="menuLang" class="menuBt">
            <option selected>EN</option>
            <option>HU</option>
            <option>GER</option>
        </select>

        <div id="mainMenu">
            <h1 id="menuTitle">Fat-Man</h1>
            <button data-button="" id="menuBtPlay" class="menuBt" data-translate="play">Play</button>
            <button data-button="settingsTemp" id="menuBtSettings" class="menuBt" data-translate="settings">Settings</button>
            <button data-button="" id="menuBtDesc" class="menuBt" data-translate="info">Info</button>
        </div>
    </template>

    <template id="settingsTemp">
        <button id="settingsBack" data-button="mainMenuTemp" class="menuBt"><span class="material-symbols-outlined">arrow_back_ios</span>Back</button>
        <select id="menuLang" class="menuBt">
            <option selected>EN</option>
            <option>HU</option>
            <option>GER</option>
        </select>
        <div id="settingsMenu">
            <h1 id="menuTitle" style="letter-spacing: 0;">Settings</h1>

            <label for="inputMasterVolume" id="labelMaster" data-translate="masterVolume">Master Volume (<span class="volumeValue" id="masterVolumeValue">0</span>)</label>
            <input id="inputMasterVolume" type="range" min="0" max="100" step="1" value="50">

            <label for="inputMusicVolume" id="labelMusic" data-translate="musicVolume">Music Volume (<span class="volumeValue" id="musicVolumeValue">0</span>)</label>
            <input id="inputMusicVolume" type="range" min="0" max="100" step="1" value="50">

            <label for="inputSFXVolume" id="labelSFX" data-translate="sfxVolume">SFX Volume (<span class="volumeValue" id="sfxVolumeValue">0</span>)</label>
            <input id="inputSFXVolume" type="range" min="0" max="100" step="1" value="50">

            <button data-button="s" class="menuBt">TESZT BUTTON</button>
        </div>
    </template>
</body>

</html>
